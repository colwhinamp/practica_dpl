name: Integración Continua Java
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cifp
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4
      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Ejecutar tests con Maven
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/cifp
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          chmod +x mvnw
          ./mvnw test